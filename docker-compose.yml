services:
  betterer-sync:
    container_name: betterer-sync
    build: .
    env_file:
      - .env
    environment:
      DATABASE_PATH: /data/sync.db
      PORT: 3000
    volumes:
      - betterer-sync-data:/data
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  betterer-sync-data:
