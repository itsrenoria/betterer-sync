services:
  betterer-sync:
    container_name: betterer-sync
    build: .
    env_file:
      - .env
    environment:
      DATABASE_PATH: /data/sync.db
      PORT: 3000
    volumes:
      - betterer-sync-data:/data
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  betterer-sync-data:
